<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }
    #controls { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; gap: 12px; align-items: center; }
    #controls button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    #controls button:hover { background: #30363d; }
    #controls span { font-size: 13px; color: #8b949e; }
    #graph { width: 100vw; height: calc(100vh - 45px); }
    svg { width: 100%; height: 100%; }
    .node circle { cursor: pointer; stroke-width: 2; }
    .node text { font-size: 11px; fill: #c9d1d9; pointer-events: none; }
    .edge line { stroke: #30363d; stroke-width: 1.5; }
    .edge text { font-size: 9px; fill: #8b949e; }
    #detail { position: fixed; top: 60px; right: 20px; width: 320px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; display: none; font-size: 13px; max-height: 80vh; overflow-y: auto; }
    #detail h3 { margin-bottom: 8px; color: #58a6ff; }
    #detail .field { margin-bottom: 6px; }
    #detail .label { color: #8b949e; }
    .type-concept circle { fill: #1f6feb; stroke: #388bfd; }
    .type-claim circle { fill: #238636; stroke: #2ea043; }
    .type-source circle { fill: #8b949e; stroke: #c9d1d9; }
    .type-question circle { fill: #d29922; stroke: #e3b341; }
    .type-direction circle { fill: #a371f7; stroke: #bc8cff; }
    .type-decision circle { fill: #f85149; stroke: #ff7b72; }
  </style>
</head>
<body>
  <div id="controls">
    <button onclick="loadGraph()">Refresh</button>
    <span id="stats"></span>
  </div>
  <div id="graph"></div>
  <div id="detail"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const GRAPH_URL = '/data/graph.json';
    let simulation, svg, nodeGroup, edgeGroup;

    function init() {
      svg = d3.select('#graph').append('svg');
      edgeGroup = svg.append('g').attr('class', 'edges');
      nodeGroup = svg.append('g').attr('class', 'nodes');

      const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', (e) => {
        edgeGroup.attr('transform', e.transform);
        nodeGroup.attr('transform', e.transform);
      });
      svg.call(zoom);

      loadGraph();
    }

    async function loadGraph() {
      try {
        const res = await fetch(GRAPH_URL + '?t=' + Date.now());
        const data = await res.json();
        render(data);
        document.getElementById('stats').textContent =
          `${data.nodes.length} nodes, ${data.edges.length} edges`;
      } catch (e) {
        document.getElementById('stats').textContent = 'Failed to load graph';
      }
    }

    function render(data) {
      const width = window.innerWidth;
      const height = window.innerHeight - 45;

      const nodeMap = new Map(data.nodes.map(n => [n.id, n]));

      const links = data.edges
        .filter(e => nodeMap.has(e.source) && nodeMap.has(e.target))
        .map(e => ({ ...e, source: e.source, target: e.target }));

      if (simulation) simulation.stop();

      simulation = d3.forceSimulation(data.nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(120))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(40));

      // Edges
      edgeGroup.selectAll('*').remove();
      const edge = edgeGroup.selectAll('g').data(links).join('g').attr('class', 'edge');
      edge.append('line');
      edge.append('text').text(d => d.relationship);

      // Nodes
      nodeGroup.selectAll('*').remove();
      const node = nodeGroup.selectAll('g').data(data.nodes).join('g')
        .attr('class', d => `node type-${d.type}`)
        .call(d3.drag()
          .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      node.append('circle').attr('r', d => 8 + (d.confidence || 0.5) * 10);
      node.append('text').attr('dy', -16).attr('text-anchor', 'middle').text(d => d.label);

      node.on('click', (e, d) => showDetail(d));

      simulation.on('tick', () => {
        edge.select('line')
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        edge.select('text')
          .attr('x', d => (d.source.x + d.target.x) / 2)
          .attr('y', d => (d.source.y + d.target.y) / 2);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }

    function showDetail(d) {
      const el = document.getElementById('detail');
      el.style.display = 'block';
      el.innerHTML = `
        <h3>${d.label}</h3>
        <div class="field"><span class="label">Type:</span> ${d.type}</div>
        <div class="field"><span class="label">Confidence:</span> ${(d.confidence || 0).toFixed(2)}</div>
        <div class="field"><span class="label">Description:</span> ${d.description || '—'}</div>
        ${d.metadata?.url ? `<div class="field"><span class="label">URL:</span> <a href="${d.metadata.url}" style="color:#58a6ff" target="_blank">${d.metadata.url}</a></div>` : ''}
        ${d.metadata?.source_type ? `<div class="field"><span class="label">Source type:</span> ${d.metadata.source_type}</div>` : ''}
        <div class="field"><span class="label">ID:</span> ${d.id}</div>
      `;
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#detail') && !e.target.closest('.node')) {
        document.getElementById('detail').style.display = 'none';
      }
    });

    init();
  </script>
</body>
</html>
